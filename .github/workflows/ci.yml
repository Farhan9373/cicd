name: CI-CD-Pipeline

on:
  push:
    branches:
      - main

jobs:
  security-and-build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    env:
      IMAGE_NAME: farhanahmad43336/nodeapp
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # -----------------------------
      # Part 5: Enforce Security Gates
      # -----------------------------

      - name: Run Gitleaks (Fail if secrets found)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Semgrep (Fail if issues found)
        run: |
          python3 -m pip install semgrep
          semgrep scan --config auto --error .

      - name: Run Trivy FS Scan (Fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          exit-code: 1

      # -----------------------------
      # Docker Build
      # -----------------------------

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME:$IMAGE_TAG .

      # -----------------------------
      # Trivy Image Scan (Optional but recommended to enforce)
      # -----------------------------

      - name: Run Trivy Image Scan (Fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: 1

      # -----------------------------
      # Push only if all previous steps pass
      # -----------------------------

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag image as latest
        run: |
          docker tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:latest

      - name: Push Docker image (commit SHA)
        run: |
          docker push $IMAGE_NAME:$IMAGE_TAG

      - name: Push Docker image (latest)
        run: |
          docker push $IMAGE_NAME:latest
